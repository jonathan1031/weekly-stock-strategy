name: Update Stock Web

on:
  schedule:
    - cron: '0 8 * * 1-5' # 台北時間 16:00
  workflow_dispatch: # 允許手動執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 升級至 v4 (支援 Node 24)

      - name: Set up Python
        uses: actions/setup-python@v5 # 升級至 v5 (支援 Node 24)
        with:
          python-version: '3.11' # 使用較新的穩定 Python 版本

      - name: Install dependencies
        run: pip install yfinance pandas numpy

      - name: Run script
        run: python app.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4 # 升級至 v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
